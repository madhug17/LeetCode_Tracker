apiVersion: apps/v1
kind: Deployment

metadata:
  name: leetcode-postgres
  labels:
    app: leetcode-tracker
    tier: database

spec:
  replicas: 1

  selector:
    matchLabels:
      app: leetcode-tracker
      tier: database

  template:
    metadata:
      labels:
        app: leetcode-tracker
        tier: database

    spec:
      containers:
        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: leetcode-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: leetcode-secret
                  key: POSTGRES_USER
        

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: leetcode-secret
                  key: POSTGRES_PASSWORD

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"
             
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          PersistantVolumeClaim: 
            claimName: postgres-pvc