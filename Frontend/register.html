
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

<div class="auth-container">
    <div class="auth-card">
        <h1>
            Create Account 
        </h1>
        <p class="subtitle">
            Start tracking your LeetCode journey 
        </p>
        <form id="registerForm">
            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <input
                type="text"
                id="leetcode_username"
                placeholder="LeetCode Username"
                required
            >

            <textarea
                id="bio"
                placeholder="Bio"
            ></textarea>

            <button type="submit">

                Register 

            </button>

        </form>

        <p class="switch-text">

            Already have account?

            <a href="login.html">

                Login 

            </a>

        </p>

    </div>

</div>

<script src="js/api.js"></script>

<script src="js/register.js"></script>

</body>

</html>
