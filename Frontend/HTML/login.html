
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="../css/style.css"
    >

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            LeetCode Tracker 
        </h1>

        <p class="subtitle">

            Login to continue 

        </p>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login 

            </button>

        </form>

        <p class="switch-text">

            Don't have account?

            <a href="register.html">

                Register 

            </a>

        </p>

    </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
