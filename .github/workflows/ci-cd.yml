name: Updated Leetcode Tracker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Installation
        run: |
          python --version
          pip list
docker: 
  need: build
  runs-on: ubuntu-latest
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Login to DockerHub
      uses: docker/login-actions@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password:  ${{ secrets.DOCKER_PASSWORD }}
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/leetcode-tracker:latest ./Backend
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/leetcode-tracker:latest
deploy: 
  needs:  docker
  runs-on: ubuntu-latest
  steps:
    - name: deployment Successful
      run: |
        echo "Docker image pushed Successful."
        echo "Now Update your local kubernetes cluster ."
